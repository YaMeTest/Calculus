<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LP Position Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
    th, td { border: 1px solid #ccc; padding: 6px; }
    input { width: 100%; box-sizing: border-box; }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    button { padding: 8px 12px; margin-top: 8px; }
    .small { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Liquid Pool P&L Tracker</h2>

  <h3>Позиция</h3>
  <table id="positionsTable"></table>

  <h3>Импорт транзакций (BSC)</h3>
  <input id="wallet" placeholder="0x... MetaMask address" />
  <button onclick="scrape()">Скрапить транзакции</button>
  <table id="cashflowsTable"></table>

<script>
const columns = [
  'date','startAmount','startPrice','rangeFrom','rangeTo','coin','chain','endAmount','endDate','durationDays'
];

async function load() {
  const positions = await fetch('/api/positions').then(r=>r.json());
  renderPositions(positions || []);
  const cashflows = await fetch('/api/cashflows').then(r=>r.json());
  renderCashflows(cashflows);
}

function renderPositions(rows) {
  const head = [...columns, 'profit', 'realApr'];
  const html = [`<tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr>`];
  if (rows.length) {
    for (const row of rows) {
      html.push(`<tr>${columns.map(c=>`<td>${row[c] ?? ''}</td>`).join('')}<td>${row.profit}</td><td>${row.realApr}</td></tr>`);
    }
  } else {
    html.push(`<tr><td colspan="14">Позиция не найдена.</td></tr>`);
  }
  document.getElementById('positionsTable').innerHTML = html.join('');
}

function renderCashflows(rows) {
  const cols = ['timestamp','txHash','valueBnb','from','to'];
  const html = [`<tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`];
  for (const r of rows) {
    html.push(`<tr>${cols.map(c=>`<td>${r[c] ?? ''}</td>`).join('')}</tr>`);
  }
  document.getElementById('cashflowsTable').innerHTML = html.join('');
}

async function scrape() {
  const address = document.getElementById('wallet').value.trim();
  const out = await fetch('/api/scrape', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({address})}).then(r=>r.json());
  alert(`Импортировано: ${out.imported ?? 0}`);
  load();
}

load();
</script>
</body>
</html>
